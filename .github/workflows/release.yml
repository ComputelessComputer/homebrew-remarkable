name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  BINARY_NAME: remarkable

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="remarkable-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "$ARCHIVE" "${BINARY_NAME}"
          shasum -a 256 "$ARCHIVE" | awk '{print $1}' > "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            remarkable-*.tar.gz
            remarkable-*.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: find dist -type f -exec mv {} . \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            remarkable-*.tar.gz
            remarkable-*.tar.gz.sha256

      - name: Collect SHAs
        id: sha
        shell: bash
        run: |
          echo "macos_intel=$(cat remarkable-*x86_64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "macos_arm=$(cat remarkable-*aarch64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_x86=$(cat remarkable-*x86_64-unknown-linux-musl.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_arm=$(cat remarkable-*aarch64-unknown-linux-gnu.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          test -n "$HOMEBREW_TAP_TOKEN"
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ComputelessComputer/homebrew-remarkable.git" tap
          FORMULA="tap/Formula/remarkable.rb"
          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          cat > "$FORMULA" <<EOF
          class Remarkable < Formula
            desc "Sync reMarkable documents locally"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.intel?
                url "${URL_BASE}/remarkable-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_intel }}"
              else
                url "${URL_BASE}/remarkable-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_arm }}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${URL_BASE}/remarkable-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x86 }}"
              else
                url "${URL_BASE}/remarkable-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm }}"
              end
            end

            def install
              bin.install "remarkable"
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/remarkable.rb
          git commit -m "Update remarkable formula to ${VERSION}"
          git push

